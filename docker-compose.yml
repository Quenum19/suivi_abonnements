services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: suivi-abonnements
    container_name: suivi-abonnements
    restart: unless-stopped
    ports:
      - '${PORT:-4000}:4000'
    environment:
      NODE_ENV: production
      PORT: 4000
      TZ: ${TZ:-Africa/Abidjan}
      # La base vit sur le volume monté (persistance après redémarrage).
      DATABASE_URL: 'file:/app/backend/prisma/data/prod.db'
      APP_PASSWORD: ${APP_PASSWORD:-}
      REMINDER_THRESHOLDS: ${REMINDER_THRESHOLDS:-30,7,1}
      REMINDER_CRON: ${REMINDER_CRON:-0 8 * * *}
      SCHEDULER_ENABLED: ${SCHEDULER_ENABLED:-true}
      EMAIL_ENABLED: ${EMAIL_ENABLED:-false}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_SECURE: ${SMTP_SECURE:-false}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      EMAIL_FROM: ${EMAIL_FROM:-Suivi abonnements <noreply@example.com>}
      EMAIL_TO: ${EMAIL_TO:-}
      N8N_ENABLED: ${N8N_ENABLED:-false}
      N8N_WEBHOOK_URL: ${N8N_WEBHOOK_URL:-}
    volumes:
      - subs-data:/app/backend/prisma/data
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://localhost:4000/api/health']
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  subs-data:
